- type: custom-api
  title: Last Race Results
  cache: 1d
  url: http://${F1_API_URL}:4463/f1/last_race/
  template: |
    <div class="flex flex-column gap-10">
      <p class="size-h5">{{ .JSON.String "raceName" }}</p>
      <ul class="list collapsible-container" data-collapse-after="5">
        {{ range $i, $v := .JSON.Array "results" }}
        <li class="flex items-center {{ if eq $i 0 }}color-primary{{ else if eq $i 1 }}color-highlight{{ end }}">
          <div style="display: grid; grid-template-columns: minmax(0, 1fr) auto minmax(5.5rem, auto); align-items: baseline; column-gap: 0.6rem; width: 100%;">
            <div class="min-width-0" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
              {{ .String "position" }}. {{ .String "surname" }}
              <img src="https://flagcdn.com/w20/{{ .String "flag" }}.png"
                alt=""
                style="width: 20px; height: 14px; object-fit: cover; vertical-align: middle"
                class="inline-block rounded-sm" />
            </div>

            <div class="size-h6" style="white-space: nowrap;">
              {{ if .String "teamId" }}({{ .String "teamId" }}){{ end }}
            </div>

            <span class="text-right" style="white-space: nowrap;">{{ .String "time" }}</span>
          </div>
        </li>
        {{ end }}
      </ul>
    </div>
